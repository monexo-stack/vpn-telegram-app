
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Admin Panel for VPN Bot</title>
      <script>
        // Применяем тему ДО загрузки React для избежания мерцания
        (function() {
          var theme = localStorage.getItem('theme');
          if (!theme) theme = 'dark'; // По умолчанию тёмная тема
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        })();
      </script>
      <!-- Telegram WebApp SDK for Mini App support -->
      <script src="https://telegram.org/js/telegram-web-app.js"></script>
      <style>
        /* Фоновый цвет до загрузки CSS */
        html { background-color: #09090b; }
        html:not(.dark) { background-color: #ffffff; }
      </style>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
